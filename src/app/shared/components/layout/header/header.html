<header
  class="sticky top-0 z-40 border-b border-slate-200/80 bg-white/90 shadow-sm backdrop-blur-md"
>
  <div class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-3 sm:px-6">
    <a
      routerLink="/home"
      class="flex min-w-0 items-center gap-2 rounded-lg focus:outline-none focus-visible:ring-2 focus-visible:ring-[var(--color-brand)]"
      (click)="closeMenu()"
    >
      <span
        class="flex size-9 shrink-0 items-center justify-center rounded-lg bg-[var(--color-brand)] text-sm font-bold text-white"
        aria-hidden="true"
        >B</span
      >
      <div class="min-w-0 leading-tight">
        <span class="block truncate text-sm font-semibold text-slate-900">BTG</span>
        <span class="block truncate text-xs text-slate-500">Fondos FPV / FIC</span>
      </div>
    </a>

    <div
      class="hidden items-center gap-1 md:flex"
      role="navigation"
      aria-label="Principal"
    >
      <a
        routerLink="/home"
        routerLinkActive="bg-slate-100 text-[var(--color-brand)]"
        [routerLinkActiveOptions]="{ exact: true }"
        class="rounded-lg px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900"
        >Inicio</a
      >
      <a
        routerLink="/funds"
        routerLinkActive="bg-slate-100 text-[var(--color-brand)]"
        class="rounded-lg px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900"
        >Fondos</a
      >
      <a
        routerLink="/portfolio"
        routerLinkActive="bg-slate-100 text-[var(--color-brand)]"
        class="rounded-lg px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900"
        >Cartera</a
      >
      <a
        routerLink="/transactions"
        routerLinkActive="bg-slate-100 text-[var(--color-brand)]"
        class="rounded-lg px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900"
        >Historial</a
      >
    </div>

    <div class="flex items-center gap-3">
      <div
        class="hidden rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-right sm:block"
      >
        <p class="text-[10px] font-medium uppercase tracking-wide text-slate-500">
          Saldo disponible
        </p>
        <p class="text-sm font-semibold tabular-nums text-slate-900">
          $ {{ mockBalanceCop | number: '1.0-0' }} <span class="text-slate-500">COP</span>
        </p>
      </div>

      <button
        type="button"
        class="inline-flex items-center justify-center rounded-lg border border-slate-200 p-2 text-slate-700 hover:bg-slate-50 md:hidden"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen()"
        aria-controls="mobile-nav"
        aria-label="Abrir menú"
      >
        @if (menuOpen()) {
          <svg class="size-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        } @else {
          <svg class="size-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
        }
      </button>
    </div>
  </div>

  @if (menuOpen()) {
    <nav
      id="mobile-nav"
      class="border-t border-slate-100 bg-white px-4 py-3 md:hidden"
      aria-label="Móvil"
    >
      <div class="mb-3 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 sm:hidden">
        <p class="text-[10px] font-medium uppercase tracking-wide text-slate-500">
          Saldo disponible
        </p>
        <p class="text-sm font-semibold tabular-nums text-slate-900">
          $ {{ mockBalanceCop | number: '1.0-0' }} <span class="text-slate-500">COP</span>
        </p>
      </div>
      <div class="flex flex-col gap-1">
        <a
          routerLink="/home"
          routerLinkActive="bg-slate-100 font-semibold text-[var(--color-brand)]"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-lg px-3 py-2.5 text-sm text-slate-700"
          (click)="closeMenu()"
          >Inicio</a
        >
        <a
          routerLink="/funds"
          routerLinkActive="bg-slate-100 font-semibold text-[var(--color-brand)]"
          class="rounded-lg px-3 py-2.5 text-sm text-slate-700"
          (click)="closeMenu()"
          >Fondos</a
        >
        <a
          routerLink="/portfolio"
          routerLinkActive="bg-slate-100 font-semibold text-[var(--color-brand)]"
          class="rounded-lg px-3 py-2.5 text-sm text-slate-700"
          (click)="closeMenu()"
          >Cartera</a
        >
        <a
          routerLink="/transactions"
          routerLinkActive="bg-slate-100 font-semibold text-[var(--color-brand)]"
          class="rounded-lg px-3 py-2.5 text-sm text-slate-700"
          (click)="closeMenu()"
          >Historial</a
        >
      </div>
    </nav>
  }
</header>
