<div
  class="fixed inset-0 z-50 flex items-end justify-center bg-slate-900/50 p-0 sm:items-center sm:p-4"
  data-backdrop="true"
  (click)="onBackdropClick($event)"
  role="presentation"
>
  <div
    class="flex max-h-[90vh] w-full max-w-lg flex-col rounded-t-2xl bg-white shadow-2xl sm:rounded-2xl"
    role="dialog"
    aria-modal="true"
    aria-labelledby="subscribe-title"
    (click)="$event.stopPropagation()"
  >
    <header
      class="flex items-start justify-between gap-4 border-b border-slate-100 px-5 py-4 sm:px-6"
    >
      <div class="min-w-0">
        <h2 id="subscribe-title" class="text-lg font-semibold text-slate-900">
          Suscribirse al fondo
        </h2>
        <p class="mt-1 truncate text-sm text-slate-500" [title]="fund().name">
          {{ fund().name }}
        </p>
      </div>
      <button
        type="button"
        (click)="close()"
        class="rounded-lg p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-[var(--color-brand)]"
        aria-label="Cerrar"
      >
        <svg class="size-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </header>

    <div class="overflow-y-auto px-5 py-5 sm:px-6">
      <dl class="mb-6 grid grid-cols-2 gap-3 rounded-xl bg-slate-50 p-4 text-sm">
        <div>
          <dt class="text-slate-500">Categoría</dt>
          <dd class="mt-0.5 font-medium text-slate-900">{{ fund().category }}</dd>
        </div>
        <div>
          <dt class="text-slate-500">Monto mínimo</dt>
          <dd class="mt-0.5 font-medium tabular-nums text-slate-900">
            $ {{ fund().minimumAmount | number: '1.0-0' }} COP
          </dd>
        </div>
      </dl>

      <form class="space-y-5" (ngSubmit)="submit()">
        <div>
          <label for="sub-amount" class="block text-sm font-medium text-slate-700">
            Monto a invertir (COP)
          </label>
          <input
            id="sub-amount"
            name="amount"
            type="number"
            [(ngModel)]="amount"
            class="mt-1.5 w-full rounded-lg border border-slate-200 px-3 py-2.5 text-slate-900 tabular-nums shadow-sm outline-none transition focus:border-[var(--color-brand)] focus:ring-2 focus:ring-[var(--color-brand)]/20"
          />
          <p class="mt-1.5 text-xs text-slate-500">
            Debe ser igual o mayor al mínimo y no superar su saldo disponible.
          </p>
        </div>

        <fieldset>
          <legend class="text-sm font-medium text-slate-700">Notificación</legend>
          <p class="mt-0.5 text-xs text-slate-500">
            Elija cómo desea recibir la confirmación de la suscripción.
          </p>
          <div class="mt-3 flex flex-col gap-2 sm:flex-row sm:gap-4">
            <label
              class="flex cursor-pointer items-center gap-2 rounded-lg border border-slate-200 px-3 py-2.5 has-[:checked]:border-[var(--color-brand)] has-[:checked]:bg-blue-50/80"
            >
              <input
                type="radio"
                name="notificationMethod"
                [value]="NotificationMethod.Email"
                [(ngModel)]="notificationMethod"
              />
              <span class="text-sm text-slate-800">Correo electrónico</span>
            </label>
            <label
              class="flex cursor-pointer items-center gap-2 rounded-lg border border-slate-200 px-3 py-2.5 has-[:checked]:border-[var(--color-brand)] has-[:checked]:bg-blue-50/80"
            >
              <input
                type="radio"
                name="notificationMethod"
                [value]="NotificationMethod.Sms"
                [(ngModel)]="notificationMethod"
              />
              <span class="text-sm text-slate-800">SMS</span>
            </label>
          </div>
        </fieldset>

        <div class="flex flex-col-reverse gap-2 border-t border-slate-100 pt-5 sm:flex-row sm:justify-end">
          <button
            type="button"
            (click)="close()"
            class="rounded-lg px-4 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-100 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400"
          >
            Cancelar
          </button>
          <button
            type="submit"
            class="rounded-lg bg-[var(--color-brand)] px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-[var(--color-brand-light)] focus:outline-none focus-visible:ring-2 focus-visible:ring-[var(--color-brand)] focus-visible:ring-offset-2"
          >
            Confirmar suscripción
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
